spring:
  application:
    name: backend

  datasource:
    url: jdbc:mysql://localhost:3306/kcpilot?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: hamin
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
