openapi: 3.1.0
info:
  title: KCpilot API
  description: |
    KC 인증 사전진단 AI 서비스 KCpilot의 백엔드 API.

    - 인증: JWT Bearer Token
    - 기본 경로: /api/v1
    - 시간 형식: ISO 8601 (UTC)
    - 페이지네이션: Spring Pageable 호환 (page는 0부터 시작)
  version: 0.1.0
  contact:
    name: KCpilot
  license:
    name: Proprietary

servers:
  - url: http://localhost:8080/api/v1
    description: 로컬 개발 서버
  - url: https://staging.kcpilot.example.com/api/v1
    description: 스테이징 (TBD)

tags:
  - name: Auth
    description: 인증 (회원가입, 로그인, 토큰 갱신, 로그아웃)
  - name: Users
    description: 사용자 정보
  - name: Assessments
    description: KC 인증 진단
  - name: Files
    description: 파일 업로드 (사양서 PDF 등)

security:
  - bearerAuth: []

paths:
  /auth/signup:
    post:
      tags: [Auth]
      operationId: signup
      summary: 회원가입
      description: 이메일/비밀번호 기반 회원가입.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
            example:
              email: user@example.com
              password: Pa$$w0rd!
              name: 홍길동
      responses:
        '201':
          description: 회원가입 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
              example:
                userId: 1
                email: user@example.com
                name: 홍길동
                createdAt: '2026-05-22T10:30:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: 이메일 중복
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                timestamp: '2026-05-22T10:30:00Z'
                status: 409
                code: EMAIL_ALREADY_EXISTS
                message: 이미 사용 중인 이메일입니다.
                path: /api/v1/auth/signup
                requestId: req-abc123
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: 로그인
      description: 이메일/비밀번호로 로그인하여 JWT 토큰을 발급한다.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: user@example.com
              password: Pa$$w0rd!
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
              example:
                accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                tokenType: Bearer
                expiresIn: 3600
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: 이메일 또는 비밀번호 불일치
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                timestamp: '2026-05-22T10:30:00Z'
                status: 401
                code: INVALID_CREDENTIALS
                message: 이메일 또는 비밀번호가 일치하지 않습니다.
                path: /api/v1/auth/login
                requestId: req-def456
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      summary: 토큰 갱신
      description: refresh token으로 access token을 갱신한다.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
            example:
              refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: 토큰 갱신 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
              example:
                accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                tokenType: Bearer
                expiresIn: 3600
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: 유효하지 않거나 만료된 refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                timestamp: '2026-05-22T10:30:00Z'
                status: 401
                code: INVALID_REFRESH_TOKEN
                message: refresh token이 유효하지 않거나 만료되었습니다.
                path: /api/v1/auth/refresh
                requestId: req-ghi789
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: 로그아웃
      description: 현재 사용자의 refresh token을 무효화한다.
      responses:
        '204':
          description: 로그아웃 성공
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /users/me:
    get:
      tags: [Users]
      operationId: getCurrentUser
      summary: 내 정보 조회
      description: 현재 로그인된 사용자의 프로필을 반환한다.
      responses:
        '200':
          description: 사용자 정보 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
              example:
                userId: 1
                email: user@example.com
                name: 홍길동
                createdAt: '2026-05-22T10:30:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /assessments:
    post:
      tags: [Assessments]
      operationId: createAssessment
      summary: 진단 생성
      description: |
        제품 정보를 입력해 KC 인증 진단을 시작한다.
        진단은 비동기로 처리되며, 반환된 assessmentId로 진단 상태와 결과를 폴링한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssessmentCreateRequest'
            example:
              productName: 헤어드라이어
              productPurpose: 가정용 모발 건조
              usesElectricity: true
              forChildren: false
              specifications: '220V 1200W, 정격 시간 10분'
              specSheetFileId: 42
      responses:
        '201':
          description: 진단 생성 성공 (진단 작업이 큐에 등록됨)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentSummary'
              example:
                assessmentId: 100
                productName: 헤어드라이어
                status: PENDING
                createdAt: '2026-05-22T10:30:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 참조한 사양서 파일을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                timestamp: '2026-05-22T10:30:00Z'
                status: 404
                code: SPEC_SHEET_NOT_FOUND
                message: 사양서 파일을 찾을 수 없습니다.
                path: /api/v1/assessments
                requestId: req-jkl012
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags: [Assessments]
      operationId: listAssessments
      summary: 진단 이력 목록 조회
      description: 본인이 생성한 진단 목록을 페이지 단위로 조회한다.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/SortParam'
        - name: status
          in: query
          description: 진단 상태로 필터링
          required: false
          schema:
            $ref: '#/components/schemas/AssessmentStatus'
      responses:
        '200':
          description: 진단 이력 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentSummaryPage'
              example:
                items:
                  - assessmentId: 100
                    productName: 헤어드라이어
                    status: COMPLETED
                    confidence: HIGH
                    createdAt: '2026-05-22T10:30:00Z'
                    completedAt: '2026-05-22T10:30:45Z'
                  - assessmentId: 99
                    productName: 스마트 학습 인형
                    status: COMPLETED
                    confidence: HIGH
                    createdAt: '2026-05-21T15:10:00Z'
                    completedAt: '2026-05-21T15:10:52Z'
                pageInfo:
                  page: 0
                  size: 20
                  totalElements: 2
                  totalPages: 1
                  hasNext: false
                  hasPrevious: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /assessments/{assessmentId}:
    parameters:
      - $ref: '#/components/parameters/AssessmentIdParam'
    get:
      tags: [Assessments]
      operationId: getAssessment
      summary: 진단 상세 조회
      description: |
        진단 ID로 진단 상태와 결과를 조회한다.
        status가 COMPLETED일 때만 result 필드가 채워진다.
      responses:
        '200':
          description: 진단 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentDetail'
              example:
                assessmentId: 100
                productName: 헤어드라이어
                productPurpose: 가정용 모발 건조
                usesElectricity: true
                forChildren: false
                specifications: '220V 1200W, 정격 시간 10분'
                specSheetFileId: 42
                status: COMPLETED
                confidence: HIGH
                createdAt: '2026-05-22T10:30:00Z'
                completedAt: '2026-05-22T10:30:45Z'
                result:
                  applicableCertifications:
                    - axis: SAFETY
                      type: SAFETY_CONFIRMATION
                      name: 안전확인
                      description: 위해 우려가 있는 제품 (제품시험만)
                      authority: 산업통상자원부/KATS
                    - axis: EMC
                      type: EMC_REGISTRATION
                      name: 적합등록
                      description: 위해 우려 중간 기자재
                      authority: 과학기술정보통신부/국립전파연구원
                  applicableCategories: [ELECTRICAL_APPLIANCE]
                  testItems:
                    - itemCode: SAF-001
                      name: 전기적 안전성 시험
                      description: 절연저항, 절연내력, 누설전류 측정
                    - itemCode: EMC-001
                      name: 전자파 방사 시험
                      description: 30MHz~1GHz 방사 전자파 측정
                  recommendedTestLabs:
                    - labCode: KTL
                      name: 한국산업기술시험원
                      specialty: 종합 (안전+전자파)
                      contactUrl: https://www.ktl.re.kr
                  similarRecalls:
                    - recallId: R-2024-0301
                      productName: A사 드라이어
                      recallDate: '2024-03-01'
                      reason: 과열로 인한 화재 위험
                      sourceUrl: https://www.safetykorea.kr/recall/123
                  legalSources:
                    - lawName: 전기용품 및 생활용품 안전관리법
                      article: 시행규칙 별표 3 제5호
                      citation: 전기용품 안전확인 대상 품목으로 명시
                  dataReferenceDate: '2026-05-20'
                disclaimer: 본 서비스는 사전 참고용이며 법적 효력이 없습니다.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /assessments/{assessmentId}/reasoning:
    parameters:
      - $ref: '#/components/parameters/AssessmentIdParam'
    get:
      tags: [Assessments]
      operationId: getAssessmentReasoning
      summary: 진단 추론 로그 조회
      description: |
        LangGraph 워크플로우의 단계별 추론 로그를 반환한다.
        F-06 단계별 추론 로그 표시 기능에 사용된다.
        진단이 RUNNING 상태인 동안에도 부분적으로 채워진 steps를 반환할 수 있다.
      responses:
        '200':
          description: 추론 로그 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasoningLog'
              example:
                assessmentId: 100
                steps:
                  - stepNumber: 1
                    stepName: CATEGORY_CLASSIFICATION
                    description: 제품 카테고리 분류
                    output: 전기용품 (가정용 전열기구)
                    timestamp: '2026-05-22T10:30:05Z'
                    durationMs: 1200
                  - stepNumber: 2
                    stepName: CERTIFICATION_IDENTIFICATION
                    description: 적용 인증 식별
                    output: 안전확인 + 적합등록 (이중 인증)
                    timestamp: '2026-05-22T10:30:12Z'
                    durationMs: 6800
                  - stepNumber: 3
                    stepName: TEST_ITEM_EXTRACTION
                    description: 시험 항목 추출
                    output: 전기적 안전성 시험, 전자파 방사 시험 외 10건
                    timestamp: '2026-05-22T10:30:22Z'
                    durationMs: 10100
                  - stepNumber: 4
                    stepName: LAB_RECOMMENDATION
                    description: 시험기관 추천
                    output: KTL (전체 시험 가능)
                    timestamp: '2026-05-22T10:30:28Z'
                    durationMs: 5500
                  - stepNumber: 5
                    stepName: RECALL_SEARCH
                    description: 유사 리콜 사례 검색
                    output: 3건 (과열 화재 관련)
                    timestamp: '2026-05-22T10:30:35Z'
                    durationMs: 7100
                  - stepNumber: 6
                    stepName: SELF_CRITIQUE
                    description: 자기비판 노드 검증
                    output: 1차 결론 유효 (신뢰도 HIGH)
                    timestamp: '2026-05-22T10:30:45Z'
                    durationMs: 9800
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /files/spec-sheets:
    post:
      tags: [Files]
      operationId: uploadSpecSheet
      summary: 사양서 PDF 업로드
      description: |
        제품 사양서 PDF를 업로드한다.
        업로드 성공 시 반환되는 fileId를 진단 생성 요청의 specSheetFileId에 사용한다.

        - 최대 파일 크기: 20MB (확정 필요)
        - 허용 형식: application/pdf
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SpecSheetUploadRequest'
      responses:
        '201':
          description: 파일 업로드 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadResponse'
              example:
                fileId: 42
                fileName: hairdryer-spec.pdf
                fileSize: 245678
                contentType: application/pdf
                uploadedAt: '2026-05-22T10:25:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          description: 파일이 너무 큼
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                timestamp: '2026-05-22T10:30:00Z'
                status: 413
                code: FILE_TOO_LARGE
                message: 파일 크기가 20MB를 초과합니다.
                path: /api/v1/files/spec-sheets
                requestId: req-mno345
        '415':
          description: 지원하지 않는 미디어 타입
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                timestamp: '2026-05-22T10:30:00Z'
                status: 415
                code: UNSUPPORTED_MEDIA_TYPE
                message: PDF 파일만 업로드할 수 있습니다.
                path: /api/v1/files/spec-sheets
                requestId: req-pqr678
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token. Authorization 헤더에 `Bearer {accessToken}` 형식으로 전달.

  parameters:
    AssessmentIdParam:
      name: assessmentId
      in: path
      required: true
      description: 진단 ID
      schema:
        type: integer
        format: int64
        minimum: 1
    PageParam:
      name: page
      in: query
      required: false
      description: 페이지 번호 (0부터 시작)
      schema:
        type: integer
        format: int32
        minimum: 0
        default: 0
    SizeParam:
      name: size
      in: query
      required: false
      description: 페이지당 항목 수
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
        default: 20
    SortParam:
      name: sort
      in: query
      required: false
      description: |
        정렬 조건. 형식 `{field},{asc|desc}` (예: `createdAt,desc`).
        다중 정렬 시 `sort` 파라미터를 여러 번 전달.
      schema:
        type: array
        items:
          type: string
      style: form
      explode: true

  responses:
    BadRequest:
      description: 잘못된 요청 (유효성 검증 실패 등)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: '2026-05-22T10:30:00Z'
            status: 400
            code: INVALID_REQUEST
            message: 요청 값이 올바르지 않습니다.
            path: /api/v1/assessments
            requestId: req-123456
            fieldErrors:
              - field: productName
                reason: 필수 항목입니다.
    Unauthorized:
      description: 인증 실패 (토큰 없음/만료)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: '2026-05-22T10:30:00Z'
            status: 401
            code: UNAUTHORIZED
            message: 인증이 필요합니다.
            path: /api/v1/assessments
            requestId: req-stu901
    Forbidden:
      description: 권한 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: '2026-05-22T10:30:00Z'
            status: 403
            code: FORBIDDEN
            message: 해당 리소스에 접근할 권한이 없습니다.
            path: /api/v1/assessments/100
            requestId: req-vwx234
    NotFound:
      description: 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: '2026-05-22T10:30:00Z'
            status: 404
            code: NOT_FOUND
            message: 요청한 리소스를 찾을 수 없습니다.
            path: /api/v1/assessments/9999
            requestId: req-yz0123
    InternalServerError:
      description: 서버 내부 오류
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: '2026-05-22T10:30:00Z'
            status: 500
            code: INTERNAL_SERVER_ERROR
            message: 서버 내부 오류가 발생했습니다.
            path: /api/v1/assessments
            requestId: req-abc456

  schemas:
    # ===== 공통 =====
    ErrorResponse:
      type: object
      required: [timestamp, status, code, message, path, requestId]
      properties:
        timestamp:
          type: string
          format: date-time
          description: 오류 발생 시각 (UTC)
        status:
          type: integer
          format: int32
          description: HTTP 상태 코드
        code:
          type: string
          description: 도메인 에러 코드 (UPPER_SNAKE_CASE)
        message:
          type: string
          description: 사용자에게 노출 가능한 한국어 메시지
        path:
          type: string
          description: 요청 경로
        requestId:
          type: string
          description: 추적용 요청 ID
        fieldErrors:
          type: array
          description: 필드 단위 유효성 오류 (있을 때만)
          items:
            $ref: '#/components/schemas/FieldError'

    FieldError:
      type: object
      required: [field, reason]
      properties:
        field:
          type: string
        value:
          description: 거부된 값 (직렬화 가능한 임의 타입)
        reason:
          type: string

    PageInfo:
      type: object
      required: [page, size, totalElements, totalPages, hasNext, hasPrevious]
      properties:
        page:
          type: integer
          format: int32
          minimum: 0
        size:
          type: integer
          format: int32
          minimum: 1
        totalElements:
          type: integer
          format: int64
          minimum: 0
        totalPages:
          type: integer
          format: int32
          minimum: 0
        hasNext:
          type: boolean
        hasPrevious:
          type: boolean

    # ===== Auth =====
    SignupRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
          maxLength: 64
          description: 영문/숫자/특수문자 조합 권장
        name:
          type: string
          minLength: 1
          maxLength: 50

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 64

    TokenRefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    TokenPair:
      type: object
      required: [accessToken, refreshToken, tokenType, expiresIn]
      properties:
        accessToken:
          type: string
          description: API 호출 시 Bearer 토큰으로 사용
        refreshToken:
          type: string
          description: access token 만료 시 갱신용
        tokenType:
          type: string
          enum: [Bearer]
        expiresIn:
          type: integer
          format: int64
          description: access token 유효 시간 (초)

    # ===== Users =====
    UserProfile:
      type: object
      required: [userId, email, name, createdAt]
      properties:
        userId:
          type: integer
          format: int64
        email:
          type: string
          format: email
        name:
          type: string
        createdAt:
          type: string
          format: date-time

    # ===== Files =====
    SpecSheetUploadRequest:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary
          description: 사양서 PDF 파일 (최대 20MB, application/pdf)

    FileUploadResponse:
      type: object
      required: [fileId, fileName, fileSize, contentType, uploadedAt]
      properties:
        fileId:
          type: integer
          format: int64
        fileName:
          type: string
        fileSize:
          type: integer
          format: int64
          description: 파일 크기 (bytes)
        contentType:
          type: string
        uploadedAt:
          type: string
          format: date-time

    # ===== Assessments — Enum =====
    AssessmentStatus:
      type: string
      enum: [PENDING, RUNNING, COMPLETED, FAILED]
      description: |
        * `PENDING` — 진단 큐 진입, 아직 실행 전
        * `RUNNING` — LangGraph 워크플로우 실행 중
        * `COMPLETED` — 진단 완료, result 필드 채워짐
        * `FAILED` — 진단 실패, failureReason 필드 채워짐

    ConfidenceLevel:
      type: string
      enum: [HIGH, MEDIUM, LOW]
      description: |
        * `HIGH` — 명확한 법령 근거 존재
        * `MEDIUM` — 일부 모호하지만 답변 제공
        * `LOW` — 모호함 표시, 전문기관 문의 안내

    ProductCategory:
      type: string
      enum: [ELECTRICAL_APPLIANCE, HOUSEHOLD_PRODUCT, CHILDREN_PRODUCT]
      description: |
        * `ELECTRICAL_APPLIANCE` — 전기용품
        * `HOUSEHOLD_PRODUCT` — 생활용품
        * `CHILDREN_PRODUCT` — 어린이제품

    CertificationAxis:
      type: string
      enum: [SAFETY, EMC]
      description: |
        * `SAFETY` — 안전인증 축 (산업통상부/KATS)
        * `EMC` — 전자파 인증 축 (과기부/국립전파연구원)

    CertificationType:
      type: string
      enum:
        - SAFETY_CERTIFICATION
        - SAFETY_CONFIRMATION
        - SUPPLIER_DECLARATION
        - EMC_CONFORMITY
        - EMC_REGISTRATION
        - EMC_SELF_DECLARATION
        - EMC_PROVISIONAL
      description: |
        * `SAFETY_CERTIFICATION` — 안전인증 (제품시험 + 공장심사 + 정기검사)
        * `SAFETY_CONFIRMATION` — 안전확인 (제품시험만)
        * `SUPPLIER_DECLARATION` — 공급자적합성확인
        * `EMC_CONFORMITY` — 적합인증
        * `EMC_REGISTRATION` — 적합등록
        * `EMC_SELF_DECLARATION` — 자기적합확인
        * `EMC_PROVISIONAL` — 잠정인증

    ReasoningStepName:
      type: string
      enum:
        - CATEGORY_CLASSIFICATION
        - CERTIFICATION_IDENTIFICATION
        - TEST_ITEM_EXTRACTION
        - LAB_RECOMMENDATION
        - RECALL_SEARCH
        - SELF_CRITIQUE
      description: LangGraph 워크플로우 단계 식별자

    # ===== Assessments — 요청/응답 =====
    AssessmentCreateRequest:
      type: object
      required: [productName, productPurpose, usesElectricity, forChildren]
      properties:
        productName:
          type: string
          minLength: 1
          maxLength: 100
          description: 제품명
        productPurpose:
          type: string
          minLength: 1
          maxLength: 500
          description: 제품 용도
        usesElectricity:
          type: boolean
          description: 전기 사용 여부
        forChildren:
          type: boolean
          description: 어린이(만 13세 미만) 대상 여부
        specifications:
          type: string
          maxLength: 2000
          description: 주요 사양 자유 텍스트 (선택)
        specSheetFileId:
          type: integer
          format: int64
          description: 사전 업로드된 사양서 파일 ID (선택)

    AssessmentSummary:
      type: object
      required: [assessmentId, productName, status, createdAt]
      properties:
        assessmentId:
          type: integer
          format: int64
        productName:
          type: string
        status:
          $ref: '#/components/schemas/AssessmentStatus'
        confidence:
          $ref: '#/components/schemas/ConfidenceLevel'
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    AssessmentDetail:
      type: object
      required:
        - assessmentId
        - productName
        - productPurpose
        - usesElectricity
        - forChildren
        - status
        - createdAt
        - disclaimer
      properties:
        assessmentId:
          type: integer
          format: int64
        productName:
          type: string
        productPurpose:
          type: string
        usesElectricity:
          type: boolean
        forChildren:
          type: boolean
        specifications:
          type: string
        specSheetFileId:
          type: integer
          format: int64
        status:
          $ref: '#/components/schemas/AssessmentStatus'
        confidence:
          $ref: '#/components/schemas/ConfidenceLevel'
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        result:
          $ref: '#/components/schemas/AssessmentResult'
          description: 진단 결과 (status가 COMPLETED일 때만 채워짐)
        failureReason:
          type: string
          description: 진단 실패 사유 (status가 FAILED일 때만 채워짐)
        disclaimer:
          type: string
          description: 면책 문구 (응답 화면 하단 고정 표시용)

    AssessmentResult:
      type: object
      required:
        - applicableCertifications
        - applicableCategories
        - testItems
        - recommendedTestLabs
        - similarRecalls
        - legalSources
        - dataReferenceDate
      properties:
        applicableCertifications:
          type: array
          items:
            $ref: '#/components/schemas/ApplicableCertification'
        applicableCategories:
          type: array
          items:
            $ref: '#/components/schemas/ProductCategory'
        testItems:
          type: array
          items:
            $ref: '#/components/schemas/TestItem'
        recommendedTestLabs:
          type: array
          items:
            $ref: '#/components/schemas/TestLab'
        similarRecalls:
          type: array
          items:
            $ref: '#/components/schemas/RecallCase'
        legalSources:
          type: array
          items:
            $ref: '#/components/schemas/LegalSource'
        ambiguityNote:
          type: string
          description: 모호 케이스에 대한 추가 안내 (F-05). 있을 때만.
        dataReferenceDate:
          type: string
          format: date
          description: 진단에 사용된 데이터 기준일

    AssessmentSummaryPage:
      type: object
      required: [items, pageInfo]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AssessmentSummary'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'

    # ===== Assessments — 도메인 값 =====
    ApplicableCertification:
      type: object
      required: [axis, type, name, authority]
      properties:
        axis:
          $ref: '#/components/schemas/CertificationAxis'
        type:
          $ref: '#/components/schemas/CertificationType'
        name:
          type: string
          description: "한글 표시명 (예: 안전확인)"
        description:
          type: string
        authority:
          type: string
          description: 소관 부처/기관

    TestItem:
      type: object
      required: [itemCode, name]
      properties:
        itemCode:
          type: string
          description: 시험 항목 코드
        name:
          type: string
        description:
          type: string

    TestLab:
      type: object
      required: [labCode, name]
      properties:
        labCode:
          type: string
          description: 시험기관 코드 (KTL, KTR, KTC 등)
        name:
          type: string
        specialty:
          type: string
        contactUrl:
          type: string
          format: uri

    RecallCase:
      type: object
      required: [recallId, productName, recallDate, reason]
      properties:
        recallId:
          type: string
        productName:
          type: string
        recallDate:
          type: string
          format: date
        reason:
          type: string
        sourceUrl:
          type: string
          format: uri

    LegalSource:
      type: object
      required: [lawName, article]
      properties:
        lawName:
          type: string
          description: 법령명
        article:
          type: string
          description: 조문 (별표/별지 포함)
        citation:
          type: string
          description: 인용 텍스트 (있을 때만)

    ReasoningLog:
      type: object
      required: [assessmentId, steps]
      properties:
        assessmentId:
          type: integer
          format: int64
        steps:
          type: array
          items:
            $ref: '#/components/schemas/ReasoningStep'

    ReasoningStep:
      type: object
      required: [stepNumber, stepName, timestamp]
      properties:
        stepNumber:
          type: integer
          format: int32
          minimum: 1
        stepName:
          $ref: '#/components/schemas/ReasoningStepName'
        description:
          type: string
        output:
          type: string
          description: 단계 결과 요약 텍스트
        timestamp:
          type: string
          format: date-time
        durationMs:
          type: integer
          format: int64
          minimum: 0
