services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg18
    container_name: kcpilot-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro

volumes:
  postgres-data:
