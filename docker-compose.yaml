services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg18
    container_name: kcpilot-postgres
    environment:
      POSTGRES_DB: kcpilot
      POSTGRES_USER: hamin
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro

volumes:
  postgres-data:
