name: CD

on:
  push:
    branches: [ main ]

env:
  REGISTRY: asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/kcpilot
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      id-token: write  # Workload Identity Federation용

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: GCP 인증
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Docker - Artifact Registry 로그인
        run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet

      - name: backend 이미지 빌드·푸시
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/kcpilot-backend:${{ env.IMAGE_TAG }}

      - name: frontend 이미지 빌드·푸시
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/kcpilot-frontend:${{ env.IMAGE_TAG }}

      - name: ai-service 이미지 빌드·푸시
        uses: docker/build-push-action@v6
        with:
          context: ./ai-service
          push: true
          tags: ${{ env.REGISTRY }}/kcpilot-ai-service:${{ env.IMAGE_TAG }}

  deploy:
    runs-on: ubuntu-24.04
    needs: build-and-push

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: VM에 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: REGISTRY,IMAGE_TAG
          script: |
            cd ~/kcpilot

            # 새 이미지 pull
            REGISTRY=$REGISTRY IMAGE_TAG=$IMAGE_TAG \
              docker compose -f docker-compose.prod.yaml pull

            # 무중단 순서: DB → ai-service → backend → frontend
            REGISTRY=$REGISTRY IMAGE_TAG=$IMAGE_TAG \
              docker compose -f docker-compose.prod.yaml up -d --remove-orphans

            # 오래된 이미지 정리
            docker image prune -f
